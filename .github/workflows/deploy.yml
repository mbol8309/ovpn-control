name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & build
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovpn-control-dist
          path: |
            server.js
            package.json
            package-lock.json
            client/dist/
          retention-days: 7

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ovpn-control-dist
          path: /tmp/ovpn-control-artifact

      - name: Deploy to production folder
        run: |
          DEPLOY_DIR="/srv/projects/ovpn-control"
          mkdir -p "$DEPLOY_DIR"
          rsync -av --delete /tmp/ovpn-control-artifact/ "$DEPLOY_DIR/"
          cd "$DEPLOY_DIR" && npm install --omit=dev
          rm -rf /tmp/ovpn-control-artifact
          echo "✅ Deployed to $DEPLOY_DIR"

      - name: Restart service
        run: sudo systemctl restart ovpn-control
